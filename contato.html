<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter">
    <link rel="stylesheet" href="css\estilo.css">
    <title>Portfólio</title>
</head>
<body>
    <header>
        <img src=".\components\foto.png" alt="foto de perfil">
        <!--aqui vai a foto-->
        <hr>
        <!--aqui vai o menu de navegação-->
        <nav>
            <a class="btn-menu" href=index.html>SOBRE MIM</a>
            <a class="btn-menu" href=formacao.html>FORMAÇÃO</a>
            <a class="btn-menu" href=portfolio.html>PORTFÓLIO</a>
            <a class="btn-menu" href=contato.html>CONTATO</a>
        </nav>

    </header>
    <!--aqui começa o conteúdo principal-->
    <main>
        <section id="contato">
            <h1 id="titulo">CONTATO</h1>
            <!--aqui vai o formulário de contato-->
            <form action="" novalidate>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" required></textarea>
                
                <button type="submit" class="btn-enviar">Enviar</button>
            </form>

        </section>
    </main>
    <!--aqui vai o javascript-->
    <script src="js\script.js"></script>
</body>
</html>
